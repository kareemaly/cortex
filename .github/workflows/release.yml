name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install quill
        run: |
          curl -sSfL https://get.anchore.io/quill | sh -s -- -b /usr/local/bin v0.7.1
          quill version

      - name: Materialize signing inputs
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          AC_API_KEY: ${{ secrets.AC_API_KEY }}
        run: |
          set +x
          umask 077
          printf '%s' "$MACOS_CERTIFICATE" | base64 -d > "$RUNNER_TEMP/cert.p12"
          printf '%s' "$AC_API_KEY" > "$RUNNER_TEMP/notary_key.p8"
          {
            echo "QUILL_SIGN_P12=$RUNNER_TEMP/cert.p12"
            echo "QUILL_NOTARY_KEY=$RUNNER_TEMP/notary_key.p8"
            echo "QUILL_LOG_FILE=$RUNNER_TEMP/quill.log"
          } >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUILL_SIGN_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          QUILL_NOTARY_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          QUILL_NOTARY_ISSUER: ${{ secrets.AC_API_ISSUER }}

      - name: Cleanup signing inputs
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/quill.log" ]; then
            echo "::group::quill.log"
            cat "$RUNNER_TEMP/quill.log"
            echo "::endgroup::"
          fi
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/notary_key.p8"
