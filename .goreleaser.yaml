version: 2

builds:
  - id: cortex
    main: ./cmd/cortex
    binary: cortex-{{ .Os }}-{{ .Arch }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/kareemaly/cortex/pkg/version.Version={{.Version}}
      - -X github.com/kareemaly/cortex/pkg/version.Commit={{.Commit}}
      - -X github.com/kareemaly/cortex/pkg/version.BuildDate={{.Date}}

  - id: cortexd
    main: ./cmd/cortexd
    binary: cortexd-{{ .Os }}-{{ .Arch }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/kareemaly/cortex/pkg/version.Version={{.Version}}
      - -X github.com/kareemaly/cortex/pkg/version.Commit={{.Commit}}
      - -X github.com/kareemaly/cortex/pkg/version.BuildDate={{.Date}}

archives:
  # Raw binary per build (no tarball wrapping). The default name_template
  # adds version+os+arch suffixes which break install.sh, so pin it to the
  # plain {{ .Binary }} which already encodes os+arch (see builds above).
  - formats: [binary]
    name_template: "{{ .Binary }}"

signs:
  - id: quill-darwin
    artifacts: binary
    signature: "${artifact}"
    cmd: bash
    args:
      - -c
      - |
        case "${artifact}" in
          *-darwin-*)
            echo "==> quill sign-and-notarize ${artifact}"
            quill sign-and-notarize "${artifact}" -vv
            ;;
          *)
            echo "==> skip non-darwin: ${artifact}"
            ;;
        esac

checksum:
  name_template: "checksums.txt"

release:
  extra_files:
    - glob: install.sh

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"
