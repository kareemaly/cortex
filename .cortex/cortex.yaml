name: cortex
extend: ~/.cortex/defaults/main
architect:
  agent: claude
  args:
    - "--allow-dangerously-skip-permissions"
    - "--allowedTools"
    - "mcp__cortex__listTickets,mcp__cortex__readTicket"
ticket:
  work:
    agent: claude
    args:
      - "--permission-mode"
      - "plan"
      - "--allow-dangerously-skip-permissions"
      - "--allowedTools"
      - "mcp__cortex__readReference"
  chore:
    agent: opencode
    args: ["--model", "opencode/glm-5-free"]
git:
  worktrees: false
