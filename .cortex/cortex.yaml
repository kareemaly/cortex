name: cortex
extend: ~/.cortex/defaults/main
architect:
  agent: claude
  args:
    - "--allow-dangerously-skip-permissions"
    - "--allowedTools"
    - "mcp__cortex__listTickets,mcp__cortex__readTicket"
ticket:
  work:
    agent: opencode
    args:
      - "--agent"
      - "plan"
      - "--model"
      - "zai-coding-plan/glm-4.7"
  chore:
    agent: opencode
    args: ["--model", "opencode/glm-5-free"]
git:
  worktrees: false
